name: Build and Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Create .env file for Vite (use secrets or fallback to .env.local)
        shell: bash
        run: |
          set -euo pipefail
          echo "➡️ Génération du fichier .env pour Vite"
          # Écrire depuis les secrets (peuvent être vides si non configurés)
          cat > .env << "EOF"
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

          # Contrôle des variables essentielles
          REQUIRED=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )
          missing=()
          for key in "${REQUIRED[@]}"; do
            val=$(grep -E "^${key}=" .env | sed -e "s/^${key}=//") || true
            if [ -z "${val:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "⚠️ Variables d'environnement manquantes via Secrets: ${missing[*]}"
            if [ -f .env.local ]; then
              echo "🔁 Fallback: copie de .env.local vers .env"
              cp .env.local .env
            else
              echo "❌ Erreur: Secrets manquants (${missing[*]}) et aucun .env.local trouvé." >&2
              echo "Veuillez créer les secrets GitHub VITE_* ou ajouter un fichier .env.local au repo." >&2
              exit 1
            fi
          else
            echo "✅ Fichier .env généré depuis les Secrets."
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (Service Account)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: smart-ekele

