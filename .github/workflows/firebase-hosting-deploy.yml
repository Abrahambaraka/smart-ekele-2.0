name: Build and Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Expose selected secrets as environment variables to allow safe reference in `if:` expressions
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Create .env file for Vite (use secrets or fallback to .env.local)
        shell: bash
        run: |
          set -euo pipefail
          echo "➡️ Génération du fichier .env pour Vite"
          # Écrire depuis les secrets (peuvent être vides si non configurés)
          cat > .env << "EOF"
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID=${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          EOF

          # Contrôle des variables essentielles
          REQUIRED=(
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_STORAGE_BUCKET
            VITE_FIREBASE_MESSAGING_SENDER_ID
            VITE_FIREBASE_APP_ID
          )
          missing=()
          for key in "${REQUIRED[@]}"; do
            val=$(grep -E "^${key}=" .env | sed -e "s/^${key}=//") || true
            if [ -z "${val:-}" ]; then
              missing+=("$key")
            fi
          done

          if [ ${#missing[@]} -gt 0 ]; then
            echo "⚠️ Variables d'environnement manquantes via Secrets: ${missing[*]}"
            if [ -f .env.local ]; then
              echo "🔁 Fallback: copie de .env.local vers .env"
              cp .env.local .env
            elif [ -f .env.example ]; then
              echo "🔁 Fallback: copie de .env.example vers .env"
              cp .env.example .env
            else
              echo "❌ Erreur: Secrets manquants (${missing[*]}) et aucun .env.local/.env.example trouvé." >&2
              echo "Veuillez créer les secrets GitHub VITE_* ou ajouter un fichier .env.local (ou .env.example) au repo." >&2
              exit 1
            fi
          else
            echo "✅ Fichier .env généré depuis les Secrets."
          fi

      - name: Inspect .env (présence des clés uniquement)
        shell: bash
        run: |
          set -euo pipefail
          echo "🔎 Vérification des variables Vite présentes dans .env:"
          for key in \
            VITE_FIREBASE_API_KEY \
            VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID \
            VITE_FIREBASE_STORAGE_BUCKET \
            VITE_FIREBASE_MESSAGING_SENDER_ID \
            VITE_FIREBASE_APP_ID \
            VITE_FIREBASE_MEASUREMENT_ID
          do
            if grep -q "^${key}=" .env; then
              val=$(grep -E "^${key}=" .env | sed -e "s/^${key}=//") || true
              if [ -n "${val}" ]; then
                echo "✅ ${key}=<set>"
              else
                echo "⚠️ ${key}=<empty>"
              fi
            else
              echo "❌ ${key}=<absent>"
            fi
          done

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting (Service Account)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ env.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ env.FIREBASE_SERVICE_ACCOUNT }}
          projectId: smart-ekele

      - name: Deploy to Firebase Hosting (CLI token fallback)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT == '' && env.FIREBASE_TOKEN != '' }}
        run: npx firebase-tools deploy --project smart-ekele --only hosting --token "${{ env.FIREBASE_TOKEN }}"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ""

      - name: Fail deploy (no auth configured)
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT == '' && (env.FIREBASE_TOKEN == '' || env.FIREBASE_TOKEN == null) }}
        shell: bash
        run: |
          echo "❌ Aucun moyen d'authentification Firebase n'est configuré pour le déploiement." >&2
          echo "Veuillez soit ajouter le secret FIREBASE_SERVICE_ACCOUNT (JSON du compte de service)," >&2
          echo "soit ajouter le secret FIREBASE_TOKEN (token CLI) si vous préférez le fallback." >&2
          exit 1

